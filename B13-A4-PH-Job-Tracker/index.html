<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="app">

    <!-- Dashboard -->
    <header class="dashboard">
      <h1>Job Tracker</h1>
      <div class="stats">
        <div>Total: <span id="totalCount">0</span></div>
        <div>Interview: <span id="interviewCount">0</span></div>
        <div>Rejected: <span id="rejectedCount">0</span></div>
      </div>
    </header>

    <!-- Jobs -->
    <section class="jobs-section">
      <div class="jobs-header">
        <h2>Available Jobs</h2>
        <span id="tabCount">0 jobs</span>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="all">All</button>
        <button class="tab" data-tab="interview">Interview</button>
        <button class="tab" data-tab="rejected">Rejected</button>
      </div>

      <div id="jobsContainer"></div>

      <div id="emptyState" class="empty hidden">
        <h3>No jobs available</h3>
        <p>Please select another tab</p>
      </div>
    </section>

  </section>

  <script src="script.js"></script>
</body>
</html>
